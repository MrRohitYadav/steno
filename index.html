<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StenoMaster Pro v7</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #16a34a; --warning: #f59e0b; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #60a5fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #e2e8f0; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        textarea { width: 100%; height: 110px; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: 16px; background: transparent; color: inherit; box-sizing: border-box; resize: none; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; padding: 14px; font-weight: 700; cursor: pointer; flex: 1; font-size: 14px; transition: 0.2s; }
        .btn-play { background: var(--success); color: white; }
        .btn-pause { background: var(--warning); color: white; display: none; }
        .btn-stop { background: #ef4444; color: white; display: none; }
        
        #display { font-size: 32px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); margin-top: 10px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin: 8px 0 4px 0; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; appearance: none; background: #cbd5e1; outline: none; }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size: 20px;">StenoMaster 🚀</h2>
        <button onclick="toggleTheme()" style="border:none; background:none; font-size:18px;">🌙</button>
    </div>

    <div class="tabs">
        <button id="libTab" class="tab-btn active" onclick="showTab('library')">Library</button>
        <button id="dictTab" class="tab-btn" onclick="showTab('dictate')">Practice</button>
        <button id="quizTab" class="tab-btn" onclick="showTab('quiz')">Quiz</button>
    </div>

    <div class="card">
        <select id="voiceSelect" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></select>
        <div class="label-row">
            <span>Word Gap: <b id="gapVal">0.2</b>s</span>
            <span id="wpmEst" style="color:var(--primary)">120 WPM</span>
        </div>
        <input type="range" id="gapSlider" min="0.0" max="2.0" step="0.05" value="0.2">
        <div class="label-row" style="color:#6366f1;"><span>Phrase Speed: <b id="phraseVal">0.8</b>x</span></div>
        <input type="range" id="phraseSlider" min="0.5" max="1.1" step="0.1" value="0.8">
    </div>

    <div id="libraryPanel">
        <div class="card">
            <h3 style="margin-top:0;">New Era Key</h3>
            <select id="exerciseSelect" onchange="loadExercise()" style="width:100%; padding:10px; border-radius:8px;">
                <option value="">-- Choose Exercise --</option>
                <option value="ex1">Exercise 1 (The Date)</option>
                <option value="ex7">Exercise 7 (Fetch the Cash)</option>
                <option value="ex119">Exercise 119 (High Speed)</option>
            </select>
        </div>
    </div>

    <div id="dictatePanel" style="display:none;">
        <div class="card">
            <textarea id="textInput" placeholder="Text moves here from Library..."></textarea>
            <div class="btn-group">
                <button id="playBtn" class="btn btn-play" onclick="startDictation()">START</button>
                <button id="pauseBtn" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="stopBtn" class="btn btn-stop" onclick="stopDictation()">STOP</button>
            </div>
            <div id="display">Ready...</div>
        </div>
    </div>

    <div id="quizPanel" style="display:none;">
        <div class="card" style="text-align:center;">
            <div class="quiz-word" id="quizWord" style="font-size:40px; min-height:100px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-weight:800;">---</div>
            <div class="btn-group">
                <button id="qPlay" class="btn btn-play" onclick="startQuiz()">START QUIZ</button>
                <button id="qPause" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="qStop" class="btn btn-stop" onclick="stopQuiz()">STOP</button>
            </div>
        </div>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let isRunning = false;
    let isPaused = false;
    let voices = [];

    const library = {
    [span_6](start_span)ex1: "The date. The page. Date-the page. The debt. Pay-the debt. Who paid-the debt? Abe Page paid it, but Ted Day paid it, too. Ted paid-the debt which Abe paid. The day Abe paid-the debt, Ted paid it, too. Do page two. Aid Ed to-do it. Pay Ted to aid Abe.", //[span_6](end_span)
    [span_7](start_span)ex2: "Have-they paid-the debt? They-think-the debt was paid. Do they say so? They say they paid it to Abe. They-have usually paid us. Was-it paid to Joe? Shall they show the essay to Joe? Who shall judge-the essay? Abe shall-be-the judge.", //[span_7](end_span)
    [span_8](start_span)ex3: "Show them-the boat. Who shall fetch-the boat? Which boat shall Joe show to-them? They-have usually paid us to-do it, but they-have paid Ed, too. They both say so. They-think they-have to vote to aid them. Which-was-the page they showed us? Who-was up to page two. They both say it-was usual to vote.", //[span_8](end_span)
    [span_9](start_span)ex4: "They-will come to-the game today. They-think they-will-be delayed. Show them-the way to-the lake. Who-will come to-the boat? Do they-think we-shall beg them to-come? We-may change-the date to-the tenth. Do they know-the date?", //[span_9](end_span)
    [span_10](start_span)ex5: "Have-we paid-the debt? We-have given him the cheque to mail to-them today. Shall we take-the mail to-the boat? We-shall aim to change-the name. We-know they-will come today. They-will take-the lunch to-the lake. Joe led-the way to-the lake, but-they say it-was too-low to bathe. Was-the mail delayed? It-will-be given to him today.", //[span_10](end_span)
    [span_11](start_span)ex6: "Joe owes them-the debt, so we-have given them-the cheque. The thing to-do was to-make them weigh the coal. They both say-the coal was weighed. Who-came to take the load to the depot? We have-no lunch to take to the game. May-we-have-the yellow boat to-take to the bay? Who-will-be paid to show them-the way to-do it? We-think they will come to the show which will be given today.", //[span_11](end_span)
    [span_12](start_span)ex7: "Who-will come to fetch-the cash? We-shall-be at-the bank at two. We-know-the debt was paid. A cheque was given to him long-ago. We saw them at-the shop. They bought a ball for Jack. They got a doll for Ann, too. May-we-have a cheque for-the bag bought on-the tenth of-May? We-know they-had a long talk, but-we-think they-will give him no cash. They say Bob owes-the debt, but-the watch was paid for on-the tenth. We-think-the chalk may damage the bag. No, it-will come off. Wash it off. Ask Paul to attach a tag to the top of-the bag. We-shall check-the damage to-the boat.", //[span_12](end_span)
    [span_13](start_span)ex8: "The tall lad was paid 3s. 6d. a day to-watch-the shop. The lake was calm, so we came back on-the boat. It-was an odd thing to-do, but it was a shame to-laugh at him. Which of-them saw-the lad take-the package back to-the shop? Paul may manage to show them the way to-do-the job. We-know they-will-be-at-the game, but-they-will come back for-the show. We-think they take too-long to-do-the job. We-have usually given-the job to-them, but-we-may make a change. They-will pay for-the damage to-the tank, but-we-think they-will ask for a delay. We-had no cash to pay him at-the shop, so a cheque was given to him. Pam had to-come a long way, but saw-the game.", //[span_13](end_span)
    [span_14](start_span)ex9: "They-will-be at-the show which-will-be given on 29th-May. It-will-be on a Monday. We-shall get enough cash at-the bank to pay both of-them for-the job. Usually we engage a bungalow at-the lake for a month. The wage they paid was too low, so Tom had to-give up-the job. We-know-the debt was unpaid, but-they had no cash. Who-will aid Anna to-get-the mail for Bath off at two? We-think they-will take-the boat for Canada on-Monday, 12th-May. The envelope for-the mail was on top of-the pad. We-shall-have to ask him to pay for-the damage to-the gate. We saw them at-the game, which-was on-Monday, the tenth of-the-month.", //[span_14](end_span)
    ex10: "The bill ought-to-be paid if-we owe them for-the wood. May-we see-the book which-was to-be given to him? We owe him an apology for-the delay in mailing-the cheque. We ought to put-the money in-the bank. We-shall do-so if-we-can. May-we-have a copy of-the bill for-the wood we bought on-the fifth? The name of-the book Jessie bought was 'Making a Living.' We-shall go to-the dock on-Monday to-take a look at-the big ship. If-we-can get each of-them to-give 2s. 6d., we-shall-have enough money to feed-the family for a month. We-think we ought to-make an appeal for aid. Do-we owe him a fee for doing-the job?" [span_15](start_span)//[span_15](end_span)
};


    const grams = [
    // --- CORE GRAMMALOGUES ---
    "A", "An", "The", "All", "Two", "Too", "Of", "To", "But", "Who", "Should", "Put", "Be", "He", "If", "For", "Was", "Whose", "Shall", "Which", "Have", "Thank", "Think", "Though", "Them", "Was", "Whose", "Been", "General", "Important", "Improvement", "Whether", "Knowledge", "Language", "Large", "Subject", "Regular", "Public", "Publish", "Practice", "Between", "Give", "Given", "Him", "Am", "Own", "Are", "Our", "Hour", "Beyond", "You", "Your", "Year", "How", "Why", "Large", "Can", "Come", "Go", "Called", "Equal", "Cold", "Gold", "Quite", "Could", "According", "Care", "Dear", "Chair", "Cheer", "Larger", "Every", "Very", "More", "Remark", "Mr", "Mere", "Nor", "Near", "Sure", "Pleasure", "They", "Their", "There", "Deliver", "Difference", "Different", "Difficult", "Doctor", "During", "Subjected", "Liberty", "Member", "Number", "Remember", "Truth", "Us", "Special", "Speak", "Schooled", "School", "Simplified", "Simple", "Simply", "Small", "Subject", "Satisfaction", "Justification", "Object", "Representation", "Responsible", "Organize", "Knowledge", "Experience", "Signify", "Significance", "Significant", "Insignificant", "Insignificance",

    // --- HIGH-FREQUENCY PHRASES (SSC EXAM SPECIAL) ---
    "To-the", "Of-the", "And-the", "Should-be", "It-is", "It-will", "Which-will", "Who-will", "I-am", "We-are", "We-have", "For-the", "In-the", "At-the", "Of-which", "To-which", "On-the", "With-the", "I-will", "We-shall", "You-should", "It-should-be", "As-well-as", "As-soon-as", "As-much-as", "In-this", "Of-this", "For-this", "At-all", "By-all", "To-be", "Have-been", "Had-been", "Shall-be", "Which-be", "Who-be", "It-is-not", "I-am-not", "We-are-not", "You-are-not", "I-can", "We-can", "They-can", "It-may-be", "There-will-be", "This-is", "That-is", "There-is", "Which-is", "In-our", "Of-our", "To-our", "By-our", "With-our", "From-the", "Under-the", "Into-the", "Upon-the", "More-than", "Less-than", "Rather-than", "So-as-to", "We-think", "We-think-that", "They-think-that", "I-think-you-will", "I-hope", "I-hope-you-will", "We-hope", "We-hope-that", "In-connection-with", "In-respect-of", "In-order-to", "With-reference-to", "With-regard-to", "It-appears", "It-appears-that", "It-is-said", "It-is-suggested", "Point-of-view", "From-my-point-of-view"
];

    function loadVoices() {
        voices = synth.getVoices();
        document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function showTab(t) {
        stopDictation(); stopQuiz();
        document.getElementById('libraryPanel').style.display = t === 'library' ? 'block' : 'none';
        document.getElementById('dictatePanel').style.display = t === 'dictate' ? 'block' : 'none';
        document.getElementById('quizPanel').style.display = t === 'quiz' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(t.slice(0,3)+'Tab').classList.add('active');
    }

    function loadExercise() {
        const key = document.getElementById('exerciseSelect').value;
        if(library[key]) {
            document.getElementById('textInput').value = library[key];
            showTab('dictate');
        }
    }

    function togglePause() {
        if (!isRunning) return;
        if (!isPaused) {
            synth.pause();
            isPaused = true;
            document.querySelectorAll('.btn-pause').forEach(b => b.innerText = "RESUME");
        } else {
            synth.resume();
            isPaused = false;
            document.querySelectorAll('.btn-pause').forEach(b => b.innerText = "PAUSE");
        }
    }

    async function startDictation() {
        const text = document.getElementById('textInput').value;
        const words = text.match(/[\w-]+|[.,!?;]/g) || [];
        if(!words.length) return;

        isRunning = true; isPaused = false;
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';

        for (let i = 0; i < words.length; i++) {
            if (!isRunning) break;
            
            // PAUSE CHECK: Wait here if paused
            while (isPaused) { await new Promise(r => setTimeout(r, 100)); }

            document.getElementById('display').innerText = words[i];
            const utter = new SpeechSynthesisUtterance(words[i]);
            utter.voice = voices[document.getElementById('voiceSelect').value];
            utter.rate = words[i].includes('-') ? parseFloat(document.getElementById('phraseSlider').value) : 1.1;
            
            synth.speak(utter);
            await new Promise(r => {
                utter.onend = () => {
                    const gap = document.getElementById('gapSlider').value * 1000;
                    setTimeout(r, gap);
                };
            });
        }
        stopDictation();
    }

    function stopDictation() {
        isRunning = false; isPaused = false; synth.cancel();
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('pauseBtn').innerText = "PAUSE";
        document.getElementById('display').innerText = "Ready...";
    }

    async function startQuiz() {
        isRunning = true; isPaused = false;
        document.getElementById('qPlay').style.display = 'none';
        document.getElementById('qPause').style.display = 'block';
        document.getElementById('qStop').style.display = 'block';

        while(isRunning) {
            while (isPaused) { await new Promise(r => setTimeout(r, 100)); }
            const w = grams[Math.floor(Math.random()*grams.length)];
            document.getElementById('quizWord').innerText = w;
            const u = new SpeechSynthesisUtterance(w);
            u.voice = voices[document.getElementById('voiceSelect').value];
            synth.speak(u);
            await new Promise(r => { u.onend = () => setTimeout(r, document.getElementById('gapSlider').value * 1000); });
        }
    }

    function stopQuiz() { 
        isRunning = false; isPaused = false; synth.cancel();
        document.getElementById('qPlay').style.display = 'block';
        document.getElementById('qPause').style.display = 'none';
        document.getElementById('qStop').style.display = 'none';
        document.getElementById('qPause').innerText = "PAUSE";
        document.getElementById('quizWord').innerText = "---";
    }

    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    document.getElementById('gapSlider').oninput = function() {
        document.getElementById('gapVal').innerText = this.value;
        document.getElementById('wpmEst').innerText = Math.round(60 / (0.3 + parseFloat(this.value))) + " WPM";
    };
    document.getElementById('phraseSlider').oninput = function() { document.getElementById('phraseVal').innerText = this.value; };
</script>
</body>
</html>
