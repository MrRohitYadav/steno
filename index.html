<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StenoMaster Pro v7</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #16a34a; --warning: #f59e0b; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #60a5fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #e2e8f0; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        textarea { width: 100%; height: 110px; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: 16px; background: transparent; color: inherit; box-sizing: border-box; resize: none; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; padding: 14px; font-weight: 700; cursor: pointer; flex: 1; font-size: 14px; transition: 0.2s; }
        .btn-play { background: var(--success); color: white; }
        .btn-pause { background: var(--warning); color: white; display: none; }
        .btn-stop { background: #ef4444; color: white; display: none; }
        
        #display { font-size: 32px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); margin-top: 10px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin: 8px 0 4px 0; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; appearance: none; background: #cbd5e1; outline: none; }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size: 20px;">StenoMaster 🚀</h2>
        <button onclick="toggleTheme()" style="border:none; background:none; font-size:18px;">🌙</button>
    </div>

    <div class="tabs">
        <button id="libTab" class="tab-btn active" onclick="showTab('library')">Library</button>
        <button id="dictTab" class="tab-btn" onclick="showTab('dictate')">Practice</button>
        <button id="quizTab" class="tab-btn" onclick="showTab('quiz')">Quiz</button>
    </div>

    <div class="card">
        <select id="voiceSelect" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></select>
        <div class="label-row">
            <span>Word Gap: <b id="gapVal">0.2</b>s</span>
            <span id="wpmEst" style="color:var(--primary)">120 WPM</span>
        </div>
        <input type="range" id="gapSlider" min="0.0" max="2.0" step="0.05" value="0.2">
        <div class="label-row" style="color:#6366f1;"><span>Phrase Speed: <b id="phraseVal">0.8</b>x</span></div>
        <input type="range" id="phraseSlider" min="0.5" max="1.1" step="0.1" value="0.8">
    </div>

    <div id="libraryPanel">
        <div class="card">
            <h3 style="margin-top:0;">New Era Key</h3>
            <select id="exerciseSelect" onchange="loadExercise()" style="width:100%; padding:10px; border-radius:8px;">
    <option value="">-- Choose Exercise --</option>
    <option value="ex1">Exercise 1</option>
    <option value="ex2">Exercise 2</option>
    <option value="ex3">Exercise 3</option>
    <option value="ex4">Exercise 4</option>
    <option value="ex5">Exercise 5</option>
    <option value="ex6">Exercise 6</option>
    <option value="ex7">Exercise 7</option>
    <option value="ex8">Exercise 8</option>
    <option value="ex9">Exercise 9</option>
    <option value="ex10">Exercise 10</option>
    <option value="ex11">Exercise 11</option>
    <option value="ex12">Exercise 12</option>
    <option value="ex13">Exercise 13</option>
    <option value="ex14">Exercise 14</option>
    <option value="ex15">Exercise 15</option>
    <option value="ex16">Exercise 16</option>
    <option value="ex17">Exercise 17</option>
    <option value="ex18">Exercise 18</option>
    <option value="ex19">Exercise 19</option>
    <option value="ex20">Exercise 20</option>
    <option value="ex119">High Speed Special</option>
</select>
        </div>
    </div>

    <div id="dictatePanel" style="display:none;">
        <div class="card">
            <textarea id="textInput" placeholder="Text moves here from Library..."></textarea>
            <div class="btn-group">
                <button id="playBtn" class="btn btn-play" onclick="startDictation()">START</button>
                <button id="pauseBtn" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="stopBtn" class="btn btn-stop" onclick="stopDictation()">STOP</button>
            </div>
            <div id="display">Ready...</div>
        </div>
    </div>

    <div id="quizPanel" style="display:none;">
        <div class="card" style="text-align:center;">
            <div class="quiz-word" id="quizWord" style="font-size:40px; min-height:100px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-weight:800;">---</div>
            <div class="btn-group">
                <button id="qPlay" class="btn btn-play" onclick="startQuiz()">START QUIZ</button>
                <button id="qPause" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="qStop" class="btn btn-stop" onclick="stopQuiz()">STOP</button>
            </div>
        </div>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let isRunning = false;
    let isPaused = false;
    let voices = [];

   const library = {
    ex1: "The date. The page. Date-the page. The debt. Pay-the debt. Who paid-the debt? Abe Page paid it, but Ted Day paid it, too. Ted paid-the debt which Abe paid. The day Abe paid-the debt, Ted paid it, too. Do page two. Aid Ed to-do it. Pay Ted to aid Abe.",
    ex2: "Have-they paid-the debt? They-think-the debt was paid. Do they say so? They say they paid it to Abe. They-have usually paid us. Was-it paid to Joe? Shall they show the essay to Joe? Who shall judge-the essay? Abe shall-be-the judge.",
    ex3: "Show them-the boat. Who shall fetch-the boat? Which boat shall Joe show to-them? They-have usually paid us to-do it, but they-have paid Ed, too. They both say so. They-think they-have to vote to aid them. Which-was-the page they showed us? Who-was up to page two. They both say it-was usual to vote.",
    ex4: "They-will come to-the game today. They-think they-will-be delayed. Show them-the way to-the lake. Who-will come to-the boat? Do they-think we-shall beg them to-come? We-may change-the date to-the tenth. Do they know-the date?",
    ex5: "Have-we paid-the debt? We-have given him the cheque to mail to-them today. Shall we take-the mail to-the boat? We-shall aim to change-the name. We-know they-will come today. They-will take-the lunch to-the lake. Joe led-the way to-the lake, but-they say it-was too-low to bathe. Was-the mail delayed? It-will-be given to him today.",
    ex6: "Joe owes them-the debt, so we-have given them-the cheque. The thing to-do was to-make them weigh the coal. They both say-the coal was weighed. Who-came to take the load to the depot? We have-no lunch to take to the game. May-we-have-the yellow boat to-take to the bay? Who-will-be paid to show them-the way to-do it? We-think they will come to the show which will be given today.",
    ex7: "Who-will come to fetch-the cash? We-shall-be at-the bank at two. We-know-the debt was paid. A cheque was given to him long-ago. We saw them at-the shop. They bought a ball for Jack. They got a doll for Ann, too. May-we-have a cheque for-the bag bought on-the tenth of-May? We-know they-had a long talk, but-we-think they-will give him no cash. They say Bob owes-the debt, but-the watch was paid for on-the tenth. We-think-the chalk may damage the bag. No, it-will come off. Wash it off. Ask Paul to attach a tag to the top of-the bag. We-shall check-the damage to-the boat.",
    ex8: "The tall lad was paid 3s. 6d. a day to-watch-the shop. The lake was calm, so we came back on-the boat. It-was an odd thing to-do, but it was a shame to-laugh at him. Which of-them saw-the lad take-the package back to-the shop? Paul may manage to show them the way to-do-the job. We-know they-will-be-at-the game, but-they-will come back for-the show. We-think they take too-long to-do-the job. We-have usually given-the job to-them, but-we-may make a change. They-will pay for-the damage to-the tank, but-we-think they-will ask for a delay. We-had no cash to pay him at-the shop, so a cheque was given to him. Pam had to-come a long way, but saw-the game.",
    ex9: "They-will-be at-the show which-will-be given on 29th-May. It-will-be on a Monday. We-shall get enough cash at-the bank to pay both of-them for-the job. Usually we engage a bungalow at-the lake for a month. The wage they paid was too low, so Tom had to-give up-the job. We-know-the debt was unpaid, but-they had no cash. Who-will aid Anna to-get-the mail for Bath off at two? We-think they-will take-the boat for Canada on-Monday, 12th-May. The envelope for-the mail was on top of-the pad. We-shall-have to ask him to pay for-the damage to-the gate. We saw them at-the game, which-was on-Monday, the tenth of-the-month.",
    ex10: "The bill ought-to-be paid if-we owe them for-the wood. May-we see-the book which-was to-be given to him? We owe him an apology for-the delay in mailing-the cheque. We ought to put-the money in-the bank. We-shall do-so if-we-can. May-we-have a copy of-the bill for-the wood we bought on-the fifth? The name of-the book Jessie bought was 'Making a Living.' We-shall go to-the dock on-Monday to-take a look at-the big ship. If-we-can get each of-them to-give 2s. 6d., we-shall-have enough money to feed-the family for a month. We-think we ought to-make an appeal for aid. Do-we owe him a fee for doing-the job?",
    ex11: "If-they can get away, they-will come to see-the game. They-will-have to-leave at two, if-they wish to see it. We-shall-have to pay for-the damage to-the boat. Money for food was being given to-the family monthly. If-we-can aid them in-any-way, we ought to-do so. It-was too cool for bathing at-the beach, so they came back to-the pool. They-will-be leaving for Canada on-the tenth of-the-month. They-will go to Winnipeg on-the tenth. The lady saw a copy of-the book 'Looking at Asia.' If she can come in to see us, we-can show the lady a copy of-the book for-which she-was asking.",
    ex12: "We-shall-be lucky if-we get any money for doing-the job. Maybe-the lunch can-be given on a different day. A talk was to-be given on-the topic 'Feeding-the Family.' Eva was talking of going to Manitoba in May. If-they wish to make any money, they-will-have to-do-the job in a different way. The wood was too thick. It-was an inch in width, so we-had to ship it back. We wish to know if it-will make any difference to-them if-we ship-the load of coal today. The change may-be put into effect in May. We-have-no wish to-make a change which-will affect so-many, but they-have a different way of looking at it. If-we-can think of any-way of-doing-the thing in a different way, we-shall ask-them to-come in to see us.",
    ex13: "To-our relief, they came early. We-are leaving today, and-we should reach Winnipeg in a day or-two. Who-will-be going to see-the Army and-Navy game? If-we wish to-get to-the game early, we should-be ready in an hour. Ask Jack for a rug. Ray and Ruth are reading-the book 'The Arm of-the Law.' We wrote to-them, asking-them to-rush-the job, and-they say they-will-have-it ready in a month. We-may-be wrong, and-if-we-are, we-shall readily give him our apology. The cheque was put in an airmail envelope, and it-should reach them today.",
    ex14: "So far, we-have-had a fair share of luck. We-do a thorough repair job at our shop. We-can fetch your car and leave it at-your door. We rang-the bell, but nobody came to-the door. A year-ago Jim O'Dair bought-the ranch belonging to-the Perry family. The large ridge at Red Gap was rich in ore. It-will-be easy to-make an error and take the wrong road. We-fear we shall have to borrow money if-we-are to-carry on at-the factory. We should add enough money to the fee we give him to pay for-the fare. The jury may think-the youth should get money for-the injury. We-have thanked him for-the-money we-had to borrow. They-may thank-the judge, whose talk was put on-the air, for-the change in factory law.",
    ex15: "The charge for-the rug was put on-your March bill. We wish to remove any fear they-may-have, and-we-shall urge them to engage a lawyer. May-we take Polly and Jack to see-the parade on-the fourth of-March? We-shall make-up a party and-have lunch at-the cake shop. We-are making a tour of Italy in March. Our party should-be in Rome on-the fourth of-the-month. We-shall get back to Canada in May. The usual charge for parking-the car at-the garage was 2s. 6d. We saw a copy of-the rare book in-the shop window. It-should pay-the firm to-go on-the air daily. Paul King was put in-charge of-the factory early in March. We-can put a mark in red at-the bottom of-each page we check.",
    ex16: "Mary and Jack are to-be married early in March. We wish to-go to-the wedding, but they-may-be married in Rome, and it-will-be too far away. We-shall ask-the lawyer to-talk for an hour. They-will take a lorry load of coal to-the shop today or tomorrow. Wrap-the package and mail it today. We-think-we ought to insure-the package. We-have given-them no authority to change the policy of-the firm. We get our milk at-the dairy farm, and-we usually pay our bill monthly. The living room was at-the rear of-the shop. The door was too narrow, and-we-had to remove it to-get-the large package into-the room. Mary, whose memory was poor, read a different page of-the book each day. We-can change-the collar on-the fur wrap today, and-the lady may come in for-it tomorrow.",
    ex17: "When I-was in-your shop on-the Parade I-saw a different type of tyre tube. I should like to buy four or five of-them for-my car. I-think-you-will enjoy our show if-you-can come to see it. I-wish you to-make-out a cheque for-the boiler and get it off tonight by airmail. Our failure to-do what they wish may annoy them, but how-can we-do what they ask? The village was a mile beyond-the mouth of-the Wye. Do-you know when Roy and Dinah are going to Cuba? I-know-the boy would like to-go with-them. Why was-the charge put on-my March bill? Do-you know when-the ship may leave? It-will go out with-the tide at five. How far do-you have to-go? Do-you wish to-come with me? You-should write your name in ink at-the bottom of-the form.",
    ex18: "What-do-you think we ought to-do? I-think we should give-them a month in-which to pay-the bill. If-you wish to-catch-the boat, you-will-have to-leave early. I-think-you-will-have to buy a coil for-your car. If-you-can arrive at five you-will-be in-time for-the talk. I-have-no wish to annoy you, but I-think-the debt should-be paid. I admire-the type of youth who-will-do a job thoroughly. For a low outlay, you-can get a couch for-the room. A cure for-the lazy boy would-be to-give him a job which-would keep him busy. Why-have-you allowed our bill to-go unpaid? What-can-we-do for-you? You-can read and write for an hour. How-can-we keep in-touch with-them when-they go away? Why-do-you think it-would-be-the wrong thing to-do? I-think-you-are right, but-you-may-have to show why you-are making-the change.",
    ex19: "If-we-are to pay our-way, we-shall-have to-get new revenue. I should like to-do what-you ask, but I-have-no power to-do so. It-will-be your duty to-check each item we charge. I-shall go to-the automobile show, and-I-may buy a new car. Do-you wish to-renew your fire policy? It-will-be due tomorrow. I-am-aware of-the value of a shop window on-the avenue. I-will give-you a cheap rate to Niagara via the Lake route. What-would-be your rate for a large room with bath or shower? We-had a fire, and our factory was idle for a month: so we-had a poor year. I-have-no wish to argue with-you, for-you-may-be right in what-you say. You-will rub your eyes when-you see our New Era car. Why are-you buying a poor type of oil when-you can get a pure oil for-your money? Poor oil may damage your car; it-will pay you to buy a purer variety.",
    ex20: "Would-you like to-go to America with me in-July? I-know you-will thoroughly enjoy-the tour if-you-can come with me. I-am-going with a jolly party of four or five, and-we-are making a tour which-will take a month. We-are leaving on-the S.S. Canada on-the fifth of July, and-we-are due to arrive in America on-the tenth. We-can get a cheap rate for-the voyage if-we share a room on-the boat. Write to-me in a day or-two and say you-will come.",
    ex119: "It-is often felt that a speed of 80 words a minute in shorthand is adequate for ordinary business purposes. However, some employers require a higher degree of skill, and-they-will-not employ a stenographer who-cannot write 120 words a minute."
};
    const grams = [
    // --- CORE GRAMMALOGUES ---
    "A", "An", "The", "All", "Two", "Too", "Of", "To", "But", "Who", "Should", "Put", "Be", "He", "If", "For", "Was", "Whose", "Shall", "Which", "Have", "Thank", "Think", "Though", "Them", "Was", "Whose", "Been", "General", "Important", "Improvement", "Whether", "Knowledge", "Language", "Large", "Subject", "Regular", "Public", "Publish", "Practice", "Between", "Give", "Given", "Him", "Am", "Own", "Are", "Our", "Hour", "Beyond", "You", "Your", "Year", "How", "Why", "Large", "Can", "Come", "Go", "Called", "Equal", "Cold", "Gold", "Quite", "Could", "According", "Care", "Dear", "Chair", "Cheer", "Larger", "Every", "Very", "More", "Remark", "Mr", "Mere", "Nor", "Near", "Sure", "Pleasure", "They", "Their", "There", "Deliver", "Difference", "Different", "Difficult", "Doctor", "During", "Subjected", "Liberty", "Member", "Number", "Remember", "Truth", "Us", "Special", "Speak", "Schooled", "School", "Simplified", "Simple", "Simply", "Small", "Subject", "Satisfaction", "Justification", "Object", "Representation", "Responsible", "Organize", "Knowledge", "Experience", "Signify", "Significance", "Significant", "Insignificant", "Insignificance",

    // --- HIGH-FREQUENCY PHRASES (SSC EXAM SPECIAL) ---
    "To-the", "Of-the", "And-the", "Should-be", "It-is", "It-will", "Which-will", "Who-will", "I-am", "We-are", "We-have", "For-the", "In-the", "At-the", "Of-which", "To-which", "On-the", "With-the", "I-will", "We-shall", "You-should", "It-should-be", "As-well-as", "As-soon-as", "As-much-as", "In-this", "Of-this", "For-this", "At-all", "By-all", "To-be", "Have-been", "Had-been", "Shall-be", "Which-be", "Who-be", "It-is-not", "I-am-not", "We-are-not", "You-are-not", "I-can", "We-can", "They-can", "It-may-be", "There-will-be", "This-is", "That-is", "There-is", "Which-is", "In-our", "Of-our", "To-our", "By-our", "With-our", "From-the", "Under-the", "Into-the", "Upon-the", "More-than", "Less-than", "Rather-than", "So-as-to", "We-think", "We-think-that", "They-think-that", "I-think-you-will", "I-hope", "I-hope-you-will", "We-hope", "We-hope-that", "In-connection-with", "In-respect-of", "In-order-to", "With-reference-to", "With-regard-to", "It-appears", "It-appears-that", "It-is-said", "It-is-suggested", "Point-of-view", "From-my-point-of-view"
];

    function loadVoices() {
        voices = synth.getVoices();
        document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function showTab(t) {
        stopDictation(); stopQuiz();
        document.getElementById('libraryPanel').style.display = t === 'library' ? 'block' : 'none';
        document.getElementById('dictatePanel').style.display = t === 'dictate' ? 'block' : 'none';
        document.getElementById('quizPanel').style.display = t === 'quiz' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(t.slice(0,3)+'Tab').classList.add('active');
    }

    function loadExercise() {
        const key = document.getElementById('exerciseSelect').value;
        if(library[key]) {
            document.getElementById('textInput').value = library[key];
            showTab('dictate');
        }
    }

    function togglePause() {
        if (!isRunning) return;
        if (!isPaused) {
            synth.pause();
            isPaused = true;
            document.querySelectorAll('.btn-pause').forEach(b => b.innerText = "RESUME");
        } else {
            synth.resume();
            isPaused = false;
            document.querySelectorAll('.btn-pause').forEach(b => b.innerText = "PAUSE");
        }
    }

    async function startDictation() {
        const text = document.getElementById('textInput').value;
        const words = text.match(/[\w-]+|[.,!?;]/g) || [];
        if(!words.length) return;

        isRunning = true; isPaused = false;
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';

        for (let i = 0; i < words.length; i++) {
            if (!isRunning) break;
            
            // PAUSE CHECK: Wait here if paused
            while (isPaused) { await new Promise(r => setTimeout(r, 100)); }

            document.getElementById('display').innerText = words[i];
            const utter = new SpeechSynthesisUtterance(words[i]);
            utter.voice = voices[document.getElementById('voiceSelect').value];
            utter.rate = words[i].includes('-') ? parseFloat(document.getElementById('phraseSlider').value) : 1.1;
            
            synth.speak(utter);
            await new Promise(r => {
                utter.onend = () => {
                    const gap = document.getElementById('gapSlider').value * 1000;
                    setTimeout(r, gap);
                };
            });
        }
        stopDictation();
    }

    function stopDictation() {
        isRunning = false; isPaused = false; synth.cancel();
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('pauseBtn').innerText = "PAUSE";
        document.getElementById('display').innerText = "Ready...";
    }

    async function startQuiz() {
        isRunning = true; isPaused = false;
        document.getElementById('qPlay').style.display = 'none';
        document.getElementById('qPause').style.display = 'block';
        document.getElementById('qStop').style.display = 'block';

        while(isRunning) {
            while (isPaused) { await new Promise(r => setTimeout(r, 100)); }
            const w = grams[Math.floor(Math.random()*grams.length)];
            document.getElementById('quizWord').innerText = w;
            const u = new SpeechSynthesisUtterance(w);
            u.voice = voices[document.getElementById('voiceSelect').value];
            synth.speak(u);
            await new Promise(r => { u.onend = () => setTimeout(r, document.getElementById('gapSlider').value * 1000); });
        }
    }

    function stopQuiz() { 
        isRunning = false; isPaused = false; synth.cancel();
        document.getElementById('qPlay').style.display = 'block';
        document.getElementById('qPause').style.display = 'none';
        document.getElementById('qStop').style.display = 'none';
        document.getElementById('qPause').innerText = "PAUSE";
        document.getElementById('quizWord').innerText = "---";
    }

    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    document.getElementById('gapSlider').oninput = function() {
        document.getElementById('gapVal').innerText = this.value;
        document.getElementById('wpmEst').innerText = Math.round(60 / (0.3 + parseFloat(this.value))) + " WPM";
    };
    document.getElementById('phraseSlider').oninput = function() { document.getElementById('phraseVal').innerText = this.value; };
</script>
</body>
</html>
