<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StenoMaster Pro v7</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #16a34a; --warning: #f59e0b; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #60a5fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #e2e8f0; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        textarea { width: 100%; height: 110px; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: 16px; background: transparent; color: inherit; box-sizing: border-box; resize: none; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; padding: 14px; font-weight: 700; cursor: pointer; flex: 1; font-size: 14px; transition: 0.2s; }
        .btn-play { background: var(--success); color: white; }
        .btn-pause { background: var(--warning); color: white; display: none; }
        .btn-stop { background: #ef4444; color: white; display: none; }
        
        #display { font-size: 32px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); margin-top: 10px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin: 8px 0 4px 0; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; appearance: none; background: #cbd5e1; outline: none; }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="margin:0; font-size: 20px;">StenoMaster 🚀</h2>
        <button onclick="toggleTheme()" style="border:none; background:none; font-size:18px;">🌙</button>
    </div>

    <div class="tabs">
        <button id="libTab" class="tab-btn active" onclick="showTab('library')">Library</button>
        <button id="dictTab" class="tab-btn" onclick="showTab('dictate')">Practice</button>
        <button id="quizTab" class="tab-btn" onclick="showTab('quiz')">Quiz</button>
    </div>

    <div class="card">
        <select id="voiceSelect" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></select>
        <div class="label-row">
            <span>Word Gap: <b id="gapVal">0.2</b>s</span>
            <span id="wpmEst" style="color:var(--primary)">120 WPM</span>
        </div>
        <input type="range" id="gapSlider" min="0.0" max="2.0" step="0.05" value="0.2">
        <div class="label-row" style="color:#6366f1;"><span>Phrase Speed: <b id="phraseVal">0.8</b>x</span></div>
        <input type="range" id="phraseSlider" min="0.5" max="1.1" step="0.1" value="0.8">
    </div>

    <div id="libraryPanel">
        <div class="card">
            <h3 style="margin-top:0;">New Era Key</h3>
            <select id="exerciseSelect" onchange="loadExercise()" style="width:100%; padding:10px; border-radius:8px;">
                <option value="">-- Choose Exercise --</option>
                <option value="ex1">Exercise 1 (The Date)</option>
                <option value="ex7">Exercise 7 (Fetch the Cash)</option>
                <option value="ex119">Exercise 119 (High Speed)</option>
            </select>
        </div>
    </div>

    <div id="dictatePanel" style="display:none;">
        <div class="card">
            <textarea id="textInput" placeholder="Text moves here from Library..."></textarea>
            <div class="btn-group">
                <button id="playBtn" class="btn btn-play" onclick="startDictation()">START</button>
                <button id="pauseBtn" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="stopBtn" class="btn btn-stop" onclick="stopDictation()">STOP</button>
            </div>
            <div id="display">Ready...</div>
        </div>
    </div>

    <div id="quizPanel" style="display:none;">
        <div class="card" style="text-align:center;">
            <div class="quiz-word" id="quizWord" style="font-size:40px; min-height:100px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-weight:800;">---</div>
            <div class="btn-group">
                <button id="qPlay" class="btn btn-play" onclick="startQuiz()">START QUIZ</button>
                <button id="qPause" class="btn btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="qStop" class="btn btn-stop" onclick="stopQuiz()">STOP</button>
            </div>
        </div>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let isRunning = false;
    let isPaused = false;
    let voices = [];

    const library = {
        ex1: "1. The date. 2. The page. 3. Date-the page. 4. The debt. 5. Pay-the debt.",
        ex7: "Who-will come to fetch-the cash? We-shall-be at-the bank at two. We-know-the debt was paid. A cheque was given to him long-ago. We saw them at-the shop. They bought a ball for Jack.",
        ex119: "It-is often felt that a speed of 80 words a minute in shorthand is adequate for ordinary business purposes. However, some employers require a higher degree of skill, and-they-will-not employ a stenographer who-cannot write 120 words a minute."
    };

    const grams = ["A", "The", "To-the", "Of-the", "Should-be", "Who-will", "Thank", "Think", "Knowledge", "Language", "Important", "Subject"];

    function loadVoices() {
        voices = synth.getVoices();
        document.getElementById('voiceSelect').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function showTab(t) {
        stopDictation(); stopQuiz();
        document.getElementById('libraryPanel').style.display = t === 'library' ? 'block' : 'none';
        document.getElementById('dictatePanel').style.display = t === 'dictate' ? 'block' : 'none';
        document.getElementById('quizPanel').style.display = t === 'quiz' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(t.slice(0,3)+'Tab').classList.add('active');
    }

    function loadExercise() {
        const key = document.getElementById('exerciseSelect').value;
        if(library[key]) {
            document.getElementById('textInput').value = library[key];
            showTab('dictate');
        }
    }

    function togglePause() {
        if (!isRunning) return;
        if (!isPaused) {
            synth.pause();
            isPaused = true;
            document.querySelectorAll('.btn-pause').forEach(b => b.innerText = "RESUME");
        } else {
            synth.resume();
            isPaused = false;
            document.querySelectorAll('.btn-pause').forEach(b => b.innerText = "PAUSE");
        }
    }

    async function startDictation() {
        const text = document.getElementById('textInput').value;
        const words = text.match(/[\w-]+|[.,!?;]/g) || [];
        if(!words.length) return;

        isRunning = true; isPaused = false;
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('pauseBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'block';

        for (let i = 0; i < words.length; i++) {
            if (!isRunning) break;
            
            // PAUSE CHECK: Wait here if paused
            while (isPaused) { await new Promise(r => setTimeout(r, 100)); }

            document.getElementById('display').innerText = words[i];
            const utter = new SpeechSynthesisUtterance(words[i]);
            utter.voice = voices[document.getElementById('voiceSelect').value];
            utter.rate = words[i].includes('-') ? parseFloat(document.getElementById('phraseSlider').value) : 1.1;
            
            synth.speak(utter);
            await new Promise(r => {
                utter.onend = () => {
                    const gap = document.getElementById('gapSlider').value * 1000;
                    setTimeout(r, gap);
                };
            });
        }
        stopDictation();
    }

    function stopDictation() {
        isRunning = false; isPaused = false; synth.cancel();
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('pauseBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('pauseBtn').innerText = "PAUSE";
        document.getElementById('display').innerText = "Ready...";
    }

    async function startQuiz() {
        isRunning = true; isPaused = false;
        document.getElementById('qPlay').style.display = 'none';
        document.getElementById('qPause').style.display = 'block';
        document.getElementById('qStop').style.display = 'block';

        while(isRunning) {
            while (isPaused) { await new Promise(r => setTimeout(r, 100)); }
            const w = grams[Math.floor(Math.random()*grams.length)];
            document.getElementById('quizWord').innerText = w;
            const u = new SpeechSynthesisUtterance(w);
            u.voice = voices[document.getElementById('voiceSelect').value];
            synth.speak(u);
            await new Promise(r => { u.onend = () => setTimeout(r, document.getElementById('gapSlider').value * 1000); });
        }
    }

    function stopQuiz() { 
        isRunning = false; isPaused = false; synth.cancel();
        document.getElementById('qPlay').style.display = 'block';
        document.getElementById('qPause').style.display = 'none';
        document.getElementById('qStop').style.display = 'none';
        document.getElementById('qPause').innerText = "PAUSE";
        document.getElementById('quizWord').innerText = "---";
    }

    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    document.getElementById('gapSlider').oninput = function() {
        document.getElementById('gapVal').innerText = this.value;
        document.getElementById('wpmEst').innerText = Math.round(60 / (0.3 + parseFloat(this.value))) + " WPM";
    };
    document.getElementById('phraseSlider').oninput = function() { document.getElementById('phraseVal').innerText = this.value; };
</script>
</body>
</html>
