<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StenoMaster Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .app-container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 22px; text-align: center; margin-top: 0; color: var(--primary); }
        
        textarea { width: 100%; height: 120px; border: 1px solid #d1d1d6; border-radius: 10px; padding: 12px; font-size: 16px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        
        .save-controls { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #d1d1d6; border-radius: 8px; }
        
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: #34c759; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-red { background: #ff3b30; color: white; width: 100%; margin-top: 10px; }
        
        .saved-list { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; margin-bottom: 10px; }
        .chip { background: #e5e5ea; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .slider-box { margin: 20px 0; }
        .speed-label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 5px; appearance: none; background: #d1d1d6; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--primary); border-radius: 50%; }

        #display { font-size: 20px; text-align: center; min-height: 60px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #eee; margin-top: 15px; color: #555; }
        .active-word { color: var(--primary); font-weight: bold; transform: scale(1.2); transition: 0.1s; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <h1>StenoMaster Pro</h1>
        
        <div class="saved-list" id="savedList"></div>

        <div class="save-controls">
            <input type="text" id="fileName" placeholder="Name (e.g. Ex-1)">
            <button class="btn btn-blue" onclick="saveData()">Save</button>
        </div>

        <textarea id="textInput" placeholder="Paste shorthand text here..."></textarea>
        
        <div class="slider-box">
            <div class="speed-label">
                <span>Pause Gap: <span id="gapVal">0.5</span>s</span>
                <span id="wpmEst">~60 WPM</span>
            </div>
            <input type="range" id="gapSlider" min="0" max="3" step="0.1" value="0.5">
        </div>

        <button id="playBtn" class="btn btn-green" onclick="startDictation()">START DICTATION</button>
        <button id="stopBtn" class="btn btn-red" onclick="stopDictation()" style="display:none;">STOP</button>
        
        <div id="display">Ready for dictation...</div>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let isRunning = false;

    // Load saved files from local storage
    function loadLibrary() {
        const list = document.getElementById('savedList');
        list.innerHTML = '';
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith('steno_')) {
                const name = key.replace('steno_', '');
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.innerHTML = `<span onclick="loadText('${key}')">${name}</span> <span onclick="deleteFile('${key}')" style="color:#888; font-weight:bold;">×</span>`;
                list.appendChild(chip);
            }
        });
    }

    function saveData() {
        const name = document.getElementById('fileName').value;
        const text = document.getElementById('textInput').value;
        if (name && text) {
            localStorage.setItem('steno_' + name, text);
            loadLibrary();
        }
    }

    function loadText(key) {
        document.getElementById('textInput').value = localStorage.getItem(key);
        document.getElementById('fileName').value = key.replace('steno_', '');
    }

    function deleteFile(key) {
        localStorage.removeItem(key);
        loadLibrary();
    }

    async function startDictation() {
        const text = document.getElementById('textInput').value;
        const words = text.match(/[\w-]+|[.,!?;]/g) || [];
        if (!words.length) return;

        isRunning = true;
        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        const gap = document.getElementById('gapSlider').value;

        // 3-second countdown
        for(let i=3; i>0; i--) {
            if(!isRunning) return;
            document.getElementById('display').innerHTML = `Starting in ${i}...`;
            await new Promise(r => setTimeout(r, 1000));
        }

        for (let i = 0; i < words.length; i++) {
            if (!isRunning) break;
            
            document.getElementById('display').innerHTML = `<span class="active-word">${words[i]}</span>`;
            
            const utter = new SpeechSynthesisUtterance(words[i]);
            utter.rate = 1.0;
            synth.speak(utter);

            await new Promise(resolve => {
                utter.onend = () => setTimeout(resolve, gap * 1000);
            });
        }
        stopDictation();
    }

    function stopDictation() {
        isRunning = false;
        synth.cancel();
        document.getElementById('display').innerHTML = "Ready for dictation...";
        document.getElementById('playBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    document.getElementById('gapSlider').oninput = function() {
        document.getElementById('gapVal').innerText = this.value;
        const wpm = Math.round(60 / (0.6 + parseFloat(this.value)));
        document.getElementById('wpmEst').innerText = `~${wpm} WPM`;
    };

    loadLibrary();
</script>
</body>
</html>
